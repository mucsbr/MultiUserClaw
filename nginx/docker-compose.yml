services:
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"  # 暴露 80 端口给宿主机外部访问
    volumes:
      # 将当前目录下的 default.conf 挂载到容器内，替换 nginx 的默认站点配置
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - openclaw-external
    # 确保 frontend 启动后再启动 nginx（如果 frontend 在同一个 yaml 里可用 depends_on，如果不在则不需要下面这行）
    # depends_on:
    #   - frontend

# 声明使用外部已存在的网络
networks:
  openclaw-external:
    external: true
